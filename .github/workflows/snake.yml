name: Generate Snake Animation

on:
  # Regenerate every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Run on pushes to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: azya11
          # Use a personal access token so PRIVATE contributions are included.
          # The default github.token only sees public contributions, which made
          # the snake sparse (~90 cells vs ~249 real). Create a classic PAT with
          # the read:user (and repo) scope, add it as the GH_PAT repo secret, and
          # make sure "Include private contributions on my profile" is enabled.
          github_token: ${{ secrets.GH_PAT }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
